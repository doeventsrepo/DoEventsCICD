# Deploy DoEventsWEB a QA — SOLO MANUAL (automatizacion deshabilitada)
# Para emergencias: ejecutar manualmente con confirmacion explicita.
name: Deploy WEB QA (manual)

on:
  workflow_dispatch:
    inputs:
      confirm_manual_qa:
        description: 'Escribe DEPLOY_QA_MANUAL para confirmar despliegue QA'
        required: true
        type: string
      web_ref:
        description: Rama a desplegar (default develop — solo uso manual)
        required: false
        default: develop

concurrency:
  group: deploy-web-qa-manual
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Confirmacion obligatoria
        run: |
          if [ "${{ inputs.confirm_manual_qa }}" != "DEPLOY_QA_MANUAL" ]; then
            echo "ERROR: confirmacion invalida. Este workflow NO forma parte del pipeline automatico DEV." >&2
            exit 1
          fi

  deploy:
    needs: guard
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - uses: actions/checkout@v4
        with:
          repository: doeventsrepo/DoEventsWEB
          ref: ${{ inputs.web_ref }}
          token: ${{ secrets.DOEVENTS_WEB_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build QA
        env:
          VITE_DOEVENTS_ENV: qa
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_FACEBOOK_APP_ID: ${{ secrets.VITE_FACEBOOK_APP_ID }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: doevents-qa.auth.us-east-2.amazoncognito.com
        run: npm ci && npm run build:qa

      - name: Validar anti-mocks
        run: |
          curl -fsSL -o validate.sh https://raw.githubusercontent.com/doeventsrepo/DoEventsCICD/main/scripts/lovable-sync/validate-no-mocks.sh || true
          if [ -f validate.sh ]; then bash validate.sh .; fi
          ! grep -RIn "mockEvents\|mockTickets\|mockOrders\|hardcodedEvents" packages/shell/src/pages 2>/dev/null | grep -v test || \
            (echo "Mocks detectados en pages/" && exit 1)

      - name: Deploy S3 + CloudFront QA
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -euo pipefail
          BUCKET="${S3_BUCKET:-doevents-web-qa}"
          CF="${CLOUDFRONT_DISTRIBUTION_ID:-E3UV9NHXADGSAJ}"
          aws s3 sync packages/shell/dist/ "s3://${BUCKET}/" --delete --region us-east-2 \
            --cache-control "public, max-age=0, must-revalidate"
          aws s3 sync packages/mfe-auth/dist/ "s3://${BUCKET}/mfe-auth/" --delete --region us-east-2 \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "index.html" --exclude ".dev-server/*" --exclude "@mf-types/*"
          aws s3 cp packages/mfe-auth/dist/index.html "s3://${BUCKET}/mfe-auth/index.html" --region us-east-2
          aws s3 cp packages/shell/dist/index.html "s3://${BUCKET}/index.html" --region us-east-2 \
            --content-type "text/html" --cache-control "public, max-age=0, must-revalidate"
          aws cloudfront create-invalidation --distribution-id "$CF" --paths "/*"
          echo "Deploy QA manual completado en qa.doeventsapp.com"
