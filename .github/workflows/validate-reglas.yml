# Reusable: validar reglasActuacion YAML
name: Validate Reglas

on:
  workflow_call:
    inputs:
      rules_path:
        type: string
        default: reglasActuacion
  pull_request:
    paths:
      - 'reglasActuacion/**'
  push:
    branches: [develop, main]
    paths:
      - 'reglasActuacion/**'

jobs:
  yaml-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: doeventsrepo/DoEventsCICD
          path: cicd
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r cicd/requirements.txt
      - run: python3 cicd/scripts/lovable-sync/validate-rules.py ${{ inputs.rules_path || 'reglasActuacion' }}
