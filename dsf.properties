# DSF — política de sincronización Lovable → WEB (DoEvents)
# Overrides de cicd.config.json → dsf.syncPolicy (key=value, # comentarios)
#
# Modo recomendado DoEvents: forward-only delta — sincronizar solo lo que Lovable
# publica en cada push, sin bloquear por similitud global ni deuda histórica.

dsf.syncPolicy.blockOnSimilarity=false
dsf.syncPolicy.adaptOnlyOnManifestChanges=true
dsf.syncPolicy.designComparisonInformational=true
dsf.syncPolicy.forceAgentBelowSimilarity=false
