# Orquestador DEV-only: Lovable → Cursor Agent (empalme) → DoEventsWEB → dev.doeventsapp.com
# NO despliega QA. Ramas feature/* en WEB/Back. Prohibido develop/release/main.
name: Lovable Sync to WEB (DEV)

on:
  workflow_dispatch:
    inputs:
      run_agent:
        description: Ejecutar agente Cursor (empalme, no copia literal)
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      agent_mode:
        description: Modo del agente
        required: false
        default: frontend-only
        type: choice
        options:
          - frontend-only
          - fullstack
      lovable_ref:
        description: SHA o rama del repo diseño (discover-joyful-feed)
        required: false
        default: main
      deploy_dev_after:
        description: Desplegar DEV sa-east-1 tras adaptacion exitosa
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      web_cicd_branch:
        description: Rama base DoEventsWEB (debe ser feature/*)
        required: false
        default: feature/cicd/dev-automation
  repository_dispatch:
    types: [lovable-sync]
  workflow_call:
    inputs:
      run_agent:
        type: string
        default: 'true'
      agent_mode:
        type: string
        default: frontend-only
      lovable_ref:
        type: string
        default: main
      deploy_dev_after:
        type: string
        default: 'true'
      web_cicd_branch:
        type: string
        default: feature/cicd/dev-automation

concurrency:
  group: lovable-sync-dev
  cancel-in-progress: false

env:
  CICD_DIR: ${{ github.workspace }}/cicd
  DESIGN_REPO: doeventsrepo/discover-joyful-feed
  WEB_REPO: doeventsrepo/DoEventsWEB
  BACK_REPO: doeventsrepo/DoEventsBack
  WEB_CICD_BRANCH: feature/cicd/dev-automation
  BACK_CICD_BRANCH: feature/cicd/dev-automation
  PROTECTED_BRANCHES: main,develop,release

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Bloquear ramas protegidas
        env:
          WEB_BRANCH: ${{ inputs.web_cicd_branch || github.event.inputs.web_cicd_branch || github.event.client_payload.web_cicd_branch || env.WEB_CICD_BRANCH }}
        run: |
          set -euo pipefail
          branch="${WEB_BRANCH,,}"
          for forbidden in main develop release; do
            if [ "$branch" = "$forbidden" ] || [[ "$branch" == release/* ]]; then
              echo "ERROR: rama prohibida para automatizacion: $WEB_BRANCH" >&2
              exit 1
            fi
          done
          if [[ ! "$branch" == feature/* ]]; then
            echo "ERROR: la automatizacion solo permite ramas feature/* (recibido: $WEB_BRANCH)" >&2
            exit 1
          fi
          echo "Rama WEB valida: $WEB_BRANCH"

  prepare:
    needs: guard
    runs-on: ubuntu-latest
    outputs:
      lovable_sha: ${{ steps.manifest.outputs.sha }}
      requires_agent: ${{ steps.design.outputs.requires_agent }}
      similarity_percent: ${{ steps.design.outputs.similarity_percent }}
      web_branch: ${{ steps.branch.outputs.web_branch }}
    steps:
      - name: Checkout DoEventsCICD
        uses: actions/checkout@v4
        with:
          path: cicd

      - name: Resolver rama WEB
        id: branch
        run: |
          WEB_BRANCH="${{ inputs.web_cicd_branch || github.event.inputs.web_cicd_branch || github.event.client_payload.web_cicd_branch || env.WEB_CICD_BRANCH }}"
          echo "web_branch=$WEB_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Checkout Lovable (diseño)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DESIGN_REPO }}
          ref: ${{ inputs.lovable_ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.DOEVENTS_WEB_PAT }}
          path: lovable
          fetch-depth: 0

      - name: Checkout DoEventsWEB (rama feature)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WEB_REPO }}
          ref: ${{ steps.branch.outputs.web_branch }}
          token: ${{ secrets.DOEVENTS_WEB_PAT }}
          path: DoEventsWEB

      - name: Bootstrap ReglasAgente si falta
        run: |
          for f in reglas-front.md cambios-lovable.json decision-log.md impacto-backend.md; do
            if [ ! -f "DoEventsWEB/ReglasAgente/$f" ]; then
              mkdir -p DoEventsWEB/ReglasAgente
              cp "cicd/Reglas/artefactos-web/$f" "DoEventsWEB/ReglasAgente/$f"
            fi
          done
          if [ ! -f DoEventsWEB/.lovable-port-map.json ]; then
            cp cicd/templates/.lovable-port-map.json DoEventsWEB/.lovable-port-map.json
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r cicd/requirements.txt

      - name: Validar reglas YAML Lovable
        run: python3 cicd/scripts/lovable-sync/validate-rules.py lovable/reglasActuacion

      - name: Gate obligatorio ReglasAgente
        run: python3 cicd/scripts/lovable-sync/validate-agent-gate.py DoEventsWEB

      - name: Validar Reglas/ CICD
        run: python3 cicd/scripts/lovable-sync/validate-reglas-cicd.py cicd

      - name: Analizar cambios Lovable
        id: manifest
        working-directory: lovable
        env:
          CICD_WEB_BRANCH: ${{ steps.branch.outputs.web_branch }}
        run: |
          LOVABLE_SHA=$(git rev-parse HEAD)
          python3 ../cicd/scripts/lovable-sync/analyze-lovable-diff.py . "__last_sync__" "$LOVABLE_SHA" ../DoEventsWEB || true
          cp lovable-change-manifest.json ../cicd/lovable-change-manifest.json
          echo "sha=$LOVABLE_SHA" >> "$GITHUB_OUTPUT"
          cat ../cicd/lovable-change-manifest.json

      - name: Comparacion diseño Lovable vs WEB
        id: design
        run: |
          python3 cicd/scripts/lovable-sync/compare-design-similarity.py \
            lovable DoEventsWEB DoEventsWEB/.lovable-port-map.json cicd/design-comparison.json
          MERGE=$(python3 cicd/scripts/lovable-sync/merge-design-into-manifest.py \
            cicd/lovable-change-manifest.json cicd/design-comparison.json lovable/lovable-change-manifest.json)
          echo "$MERGE"
          echo "similarity_percent=$(echo "$MERGE" | python3 -c "import json,sys; print(json.load(sys.stdin)['overallSimilarityPercent'])")" >> "$GITHUB_OUTPUT"
          echo "requires_agent=$(echo "$MERGE" | python3 -c "import json,sys; print(str(json.load(sys.stdin)['requiresAgent']).lower())")" >> "$GITHUB_OUTPUT"

      - name: Generar reporte comparacion diseño (pre-agente)
        run: |
          DATE=$(date -u +%Y-%m-%d)
          python3 cicd/scripts/lovable-sync/generate-design-report.py \
            cicd/design-comparison.json \
            "cicd/Reports/${DATE}-design-comparison-pre-${{ github.run_id }}.md" \
            "${{ github.run_id }}-pre"

      - name: Subir artefacto comparacion diseño
        uses: actions/upload-artifact@v4
        with:
          name: design-comparison-pre-${{ github.run_id }}
          path: |
            cicd/design-comparison.json
            cicd/Reports/*-design-comparison-pre-*.md

      - name: Construir contexto agente
        run: |
          python3 cicd/scripts/lovable-sync/build-agent-context.py \
            lovable DoEventsWEB cicd/lovable-change-manifest.json lovable/.ai/agent-sync-context.md

      - name: Preparar artefactos ReglasAgente
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 cicd/scripts/lovable-sync/generate-agent-artifacts.py \
            lovable DoEventsWEB cicd/lovable-change-manifest.json

      - name: Commit artefactos ReglasAgente (rama feature)
        working-directory: DoEventsWEB
        env:
          WEB_PAT: ${{ secrets.DOEVENTS_WEB_PAT }}
          WEB_CICD_BRANCH: ${{ steps.branch.outputs.web_branch }}
        run: |
          git config user.name "doevents-cicd-bot"
          git config user.email "cicd@doeventsapp.com"
          mkdir -p docs/changes
          git add ReglasAgente/ .lovable-port-map.json
          git add docs/changes/lovable-backend-impact.md 2>/dev/null || true
          if [ -z "$(git diff --cached --name-only)" ]; then
            echo "ReglasAgente sin cambios para commit"
            exit 0
          fi
          git commit -m "chore(docs): preparar ReglasAgente para empalme Lovable→DEV [cicd:${{ github.run_id }}]"
          git push "https://x-access-token:${WEB_PAT}@github.com/${{ env.WEB_REPO }}.git" "${WEB_CICD_BRANCH}"

  adapt:
    needs: prepare
    if: |
      (inputs.run_agent == 'true' || github.event.inputs.run_agent == 'true' || github.event.client_payload.run_agent == 'true')
      && needs.prepare.outputs.requires_agent == 'true'
    runs-on: ubuntu-latest
    outputs:
      agent_branch: ${{ steps.agent_meta.outputs.branch }}
      similarity_percent_after: ${{ steps.design_post.outputs.similarity_percent }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: cicd

      - uses: actions/checkout@v4
        with:
          repository: ${{ env.DESIGN_REPO }}
          ref: ${{ needs.prepare.outputs.lovable_sha }}
          path: lovable
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: ${{ env.WEB_REPO }}
          ref: ${{ needs.prepare.outputs.web_branch }}
          token: ${{ secrets.DOEVENTS_WEB_PAT }}
          path: DoEventsWEB

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r cicd/requirements.txt

      - name: Meta rama agente
        id: agent_meta
        run: |
          SHA="${{ needs.prepare.outputs.lovable_sha }}"
          BRANCH="feature/lovable/adapt-${SHA:0:8}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Gate ReglasAgente
        run: python3 cicd/scripts/lovable-sync/validate-agent-gate.py DoEventsWEB

      - name: Manifiesto, comparacion y contexto
        env:
          CICD_WEB_BRANCH: ${{ needs.prepare.outputs.web_branch }}
        run: |
          python3 cicd/scripts/lovable-sync/analyze-lovable-diff.py lovable "__last_sync__" HEAD DoEventsWEB || true
          cp lovable/lovable-change-manifest.json cicd/lovable-change-manifest.json
          python3 cicd/scripts/lovable-sync/compare-design-similarity.py \
            lovable DoEventsWEB DoEventsWEB/.lovable-port-map.json cicd/design-comparison.json
          python3 cicd/scripts/lovable-sync/merge-design-into-manifest.py \
            cicd/lovable-change-manifest.json cicd/design-comparison.json lovable/lovable-change-manifest.json
          python3 cicd/scripts/lovable-sync/build-agent-context.py \
            lovable DoEventsWEB cicd/lovable-change-manifest.json lovable/.ai/agent-sync-context.md

      - name: Agente Cursor — empalme (NO copia literal)
        id: agent_run
        env:
          CICD_DIR: ${{ github.workspace }}/cicd
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          LOVABLE_DIR: ${{ github.workspace }}/lovable
          WEB_DIR: ${{ github.workspace }}/DoEventsWEB
          LOVABLE_SHA: ${{ needs.prepare.outputs.lovable_sha }}
          WEB_STARTING_REF: ${{ needs.prepare.outputs.web_branch }}
          BACK_STARTING_REF: ${{ env.BACK_CICD_BRANCH }}
          AGENT_BRANCH: ${{ steps.agent_meta.outputs.branch }}
          AGENT_WAIT: "true"
          AGENT_AUTO_PR: "false"
          AGENT_INCLUDE_BACK: ${{ (inputs.agent_mode == 'fullstack' || github.event.inputs.agent_mode == 'fullstack' || github.event.client_payload.agent_mode == 'fullstack') && 'true' || 'false' }}
          CURSOR_AGENT_MODEL: composer-2.5
          TARGET_ENV: dev
          BUILD_COMMAND: npm run build:devaws
        run: python3 cicd/scripts/lovable-sync/run-port-agent-api.py

      - name: Validar anti-mocks (post-agente)
        if: always()
        run: bash cicd/scripts/lovable-sync/validate-no-mocks.sh DoEventsWEB

      - name: Validar build DEV en rama agente
        if: steps.agent_run.outcome == 'success'
        run: |
          rm -rf DoEventsWEB-verify
          git clone --depth 1 --branch "${{ steps.agent_meta.outputs.branch }}" \
            "https://x-access-token:${{ secrets.DOEVENTS_WEB_PAT }}@github.com/${{ env.WEB_REPO }}.git" \
            DoEventsWEB-verify
          cd DoEventsWEB-verify
          npm ci
          npm run build:devaws

      - name: Re-comparacion diseño (post-agente)
        id: design_post
        if: steps.agent_run.outcome == 'success'
        run: |
          rm -rf DoEventsWEB-post
          git clone --depth 1 --branch "${{ steps.agent_meta.outputs.branch }}" \
            "https://x-access-token:${{ secrets.DOEVENTS_WEB_PAT }}@github.com/${{ env.WEB_REPO }}.git" \
            DoEventsWEB-post
          python3 cicd/scripts/lovable-sync/compare-design-similarity.py \
            lovable DoEventsWEB-post DoEventsWEB-post/.lovable-port-map.json cicd/design-comparison-post.json
          SIM=$(python3 -c "import json; print(json.load(open('cicd/design-comparison-post.json'))['overallSimilarityPercent'])")
          echo "similarity_percent=$SIM" >> "$GITHUB_OUTPUT"
          DATE=$(date -u +%Y-%m-%d)
          python3 cicd/scripts/lovable-sync/generate-design-report.py \
            cicd/design-comparison-post.json \
            "cicd/Reports/${DATE}-design-comparison-post-${{ github.run_id }}.md" \
            "${{ github.run_id }}-post" \
            --before cicd/design-comparison.json

      - name: Subir artefacto comparacion post-agente
        if: steps.agent_run.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: design-comparison-post-${{ github.run_id }}
          path: |
            cicd/design-comparison-post.json
            cicd/Reports/*-design-comparison-post-*.md

  deploy-dev:
    needs: [prepare, adapt]
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      (needs.adapt.result == 'success' || needs.adapt.result == 'skipped') &&
      (inputs.deploy_dev_after == 'true' || github.event.inputs.deploy_dev_after == 'true' || github.event.client_payload.deploy_dev_after == 'true' || github.event_name == 'repository_dispatch')
    uses: ./.github/workflows/deploy-web-dev.yml
    with:
      web_ref: ${{ needs.adapt.outputs.agent_branch || needs.prepare.outputs.web_branch }}
    secrets: inherit
