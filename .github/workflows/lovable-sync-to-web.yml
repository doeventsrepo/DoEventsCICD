# Alias retrocompatible — delega a DSF Sync DEV
name: Lovable Sync to WEB (DEV)

on:
  workflow_dispatch:
    inputs:
      run_agent:
        default: 'true'
        type: choice
        options: ['true', 'false']
      agent_mode:
        default: frontend-only
        type: choice
        options: [frontend-only, fullstack]
      lovable_ref:
        default: main
      deploy_dev_after:
        default: 'true'
        type: choice
        options: ['true', 'false']
      run_gap_empalme_after:
        default: 'true'
        type: choice
        options: ['true', 'false']
      web_cicd_branch:
        default: feature/cicd/dev-automation
  repository_dispatch:
    types: [lovable-sync]
  workflow_call:
    inputs:
      run_agent:
        type: string
        default: 'true'
      agent_mode:
        type: string
        default: frontend-only
      lovable_ref:
        type: string
        default: main
      deploy_dev_after:
        type: string
        default: 'true'
      web_cicd_branch:
        type: string
        default: feature/cicd/dev-automation

jobs:
  dsf-sync:
    uses: ./.github/workflows/dsf-sync-dev.yml
    with:
      run_agent: ${{ inputs.run_agent || 'true' }}
      agent_mode: ${{ inputs.agent_mode || 'frontend-only' }}
      lovable_ref: ${{ inputs.lovable_ref || 'main' }}
      deploy_dev_after: ${{ inputs.deploy_dev_after || 'true' }}
      run_gap_loop: ${{ inputs.run_gap_empalme_after || 'true' }}
      web_cicd_branch: ${{ inputs.web_cicd_branch || 'feature/cicd/dev-automation' }}
    secrets: inherit
