# Deploy Backend QA — SOLO MANUAL (no pipeline automatico)
name: Deploy Backend QA (manual)

on:
  workflow_dispatch:
    inputs:
      confirm_manual_qa:
        description: 'Escribe DEPLOY_QA_MANUAL para confirmar'
        required: true
        type: string
      back_ref:
        description: Rama DoEventsBack
        required: false
        default: feature/cicd/dev-automation

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ inputs.confirm_manual_qa }}" != "DEPLOY_QA_MANUAL" ]; then
            echo "ERROR: QA manual only" >&2
            exit 1
          fi

  deploy-login:
    needs: guard
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - uses: actions/checkout@v4
        with:
          repository: doeventsrepo/DoEventsBack
          ref: ${{ inputs.back_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy aws-lambda-login
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
        run: |
          npm install -g serverless@3.38.0
          cd aws-lambda-login
          npm install --omit=dev
          npx serverless deploy --config serverless.qa.yml --stage qa --region us-east-2
