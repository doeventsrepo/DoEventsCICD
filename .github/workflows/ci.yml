name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Validar cicd.config.json (DEV-only)
        run: |
          python3 -c "
          import json
          c=json.load(open('cicd.config.json'))
          assert c['pipeline']['targetEnvironment']=='dev'
          assert c['pipeline']['forbidAutomaticQaDeploy'] is True
          assert c['pipeline']['autoDeployDevOnLovableSync'] is True
          print('OK: pipeline DEV-only')
          "
      - run: python3 scripts/lovable-sync/validate-reglas-cicd.py .
      - name: Dry-run agente (sin API)
        run: |
          mkdir -p /tmp/web/ReglasAgente
          cp Reglas/artefactos-web/reglas-front.md /tmp/web/ReglasAgente/
          export CICD_DIR=$PWD
          export LOVABLE_DIR=$PWD/simulation/workspaces/lovable-root-extracted/lovable-run-1781776089 2>/dev/null || export LOVABLE_DIR=$PWD
          export WEB_DIR=/tmp/web
          python3 simulation/scripts/simulate-agent-dry-run.py || true
      - name: Validar workflows presentes
        run: |
          test -f .github/workflows/lovable-sync-to-web.yml
          test -f .github/workflows/deploy-web-dev.yml
          ! grep -q 'deploy_qa_after' .github/workflows/lovable-sync-to-web.yml
          ! grep -q 'uses:.*deploy-web-qa' .github/workflows/lovable-sync-to-web.yml
          ! grep -qE 'build:qa|api-qa\.doeventsapp\.com|qa\.doeventsapp\.com' .github/workflows/lovable-sync-to-web.yml
          ! grep -qE 'ref:.*develop' .github/workflows/lovable-sync-to-web.yml
          grep -q 'feature/cicd/dev-automation' .github/workflows/lovable-sync-to-web.yml
          grep -q 'build:devaws' .github/workflows/deploy-web-dev.yml
          echo "OK: pipeline automatico apunta solo a DEV (feature/*, sa-east-1)"
      - run: test -f cicd.config.json && test -f Reglas/reglas.config.json
