name: Trigger DoEventsCICD Sync

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'reglasActuacion/**'
      - 'package.json'
  workflow_dispatch:
    inputs:
      run_agent:
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar pipeline centralizado
        env:
          GH_TOKEN: ${{ secrets.DOEVENTS_CICD_PAT }}
        run: |
          gh workflow run lovable-sync-to-web.yml \
            --repo doeventsrepo/DoEventsCICD \
            --ref main \
            -f run_agent="${{ inputs.run_agent || 'true' }}" \
            -f agent_mode=frontend-only \
            -f lovable_ref="${{ github.sha }}"
