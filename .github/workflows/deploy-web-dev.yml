# Deploy DoEventsWEB a DEV sa-east-1 — DSF provider AWS
name: Deploy WEB DEV

on:
  workflow_dispatch:
    inputs:
      web_ref:
        default: feature/cicd/dev-automation
      lovable_sha:
        default: unknown
      run_id:
        default: local
  workflow_call:
    inputs:
      web_ref:
        type: string
        default: feature/cicd/dev-automation
      lovable_sha:
        type: string
        default: unknown
      run_id:
        type: string
        default: local

concurrency:
  group: deploy-web-dev
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Validar rama feature
        env:
          REF: ${{ inputs.web_ref || 'feature/cicd/dev-automation' }}
        run: |
          branch="${REF,,}"
          for forbidden in main develop release; do
            if [ "$branch" = "$forbidden" ] || [[ "$branch" == release/* ]]; then
              echo "ERROR: rama prohibida: $REF" >&2; exit 1
            fi
          done
          if [[ ! "$branch" == feature/* ]]; then
            echo "ERROR: solo feature/*" >&2; exit 1
          fi

  deploy:
    needs: guard
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          repository: doeventsrepo/DoEventsWEB
          ref: ${{ inputs.web_ref || 'feature/cicd/dev-automation' }}
          token: ${{ secrets.DOEVENTS_WEB_PAT }}

      - uses: actions/checkout@v4
        with:
          path: cicd

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build DEV (devaws)
        env:
          VITE_DOEVENTS_ENV: devaws
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_FACEBOOK_APP_ID: ${{ secrets.VITE_FACEBOOK_APP_ID }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: doevents-qa.auth.us-east-2.amazoncognito.com
        run: npm ci && npm run build:devaws

      - name: Gate G3 — Anti-mocks
        run: bash cicd/scripts/lovable-sync/validate-no-mocks.sh .

      - name: Manifest build
        run: |
          jq -n \
            --arg sha "${{ inputs.lovable_sha }}" \
            --arg run "${{ inputs.run_id }}" \
            --arg ref "${{ inputs.web_ref }}" \
            --arg built "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{lovableSha:$sha, runId:$run, webRef:$ref, builtAt:$built, qaPromotionEnabled:false}' \
            > build-manifest.json

      - name: Deploy S3 + CloudFront (sa-east-1)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          AWS_REGION: sa-east-1
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_DEV }}
          WEB_REF: ${{ inputs.web_ref || 'feature/cicd/dev-automation' }}
        run: |
          set -euo pipefail
          BUCKET="${S3_BUCKET_DEV:-doevents-web-dev}"
          CF="${CLOUDFRONT_DISTRIBUTION_ID_DEV:-${CLOUDFRONT_DISTRIBUTION_ID}}"
          aws s3 sync packages/shell/dist/ "s3://${BUCKET}/" --delete --region sa-east-1 \
            --cache-control "public, max-age=0, must-revalidate"
          aws s3 sync packages/mfe-auth/dist/ "s3://${BUCKET}/mfe-auth/" --delete --region sa-east-1 \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "index.html" --exclude ".dev-server/*" --exclude "@mf-types/*"
          aws s3 cp packages/mfe-auth/dist/index.html "s3://${BUCKET}/mfe-auth/index.html" --region sa-east-1
          aws s3 cp packages/shell/dist/index.html "s3://${BUCKET}/index.html" --region sa-east-1 \
            --content-type "text/html" --cache-control "public, max-age=0, must-revalidate"
          if [ -n "$CF" ]; then
            aws cloudfront create-invalidation --distribution-id "$CF" --paths "/*"
          fi
          echo "Deploy DEV rama ${WEB_REF}: https://dev.doeventsapp.com"

      - name: Publicar artefacto inmutable (promoción QA futura)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          DSF_ARTIFACT_BUCKET: doevents-cicd-artifacts-dev
          DSF_ARTIFACT_REGION: sa-east-1
        run: |
          bash cicd/scripts/deploy/publish-artifact.sh . build-artifact \
            "${{ inputs.lovable_sha }}" "${{ inputs.run_id }}" || echo "AVISO: artefacto no publicado (bucket opcional)"
