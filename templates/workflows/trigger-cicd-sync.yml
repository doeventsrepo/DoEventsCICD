# Copiar a discover-joyful-feed/.github/workflows/trigger-cicd-sync.yml
name: Trigger DSF Sync (DEV)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'reglasActuacion/**'
      - 'package.json'
      - 'tailwind.config.ts'
      - 'index.html'
  workflow_dispatch:
    inputs:
      run_agent:
        default: 'true'
        type: choice
        options: ['true', 'false']
      agent_mode:
        default: frontend-only
        type: choice
        options: [frontend-only, fullstack]

concurrency:
  group: trigger-dsf-sync-main
  cancel-in-progress: true

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar DSF Sync DEV
        env:
          GH_TOKEN: ${{ secrets.DOEVENTS_CICD_PAT }}
        run: |
          gh workflow run "dsf-sync-dev.yml" \
            --repo doeventsrepo/DoEventsCICD \
            --ref main \
            -f run_agent="${{ inputs.run_agent || 'true' }}" \
            -f agent_mode="${{ inputs.agent_mode || 'frontend-only' }}" \
            -f lovable_ref="${{ github.sha }}" \
            -f deploy_dev_after=true \
            -f run_gap_loop=true \
            -f web_cicd_branch=feature/cicd/dev-automation
